<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://*.basemaps.cartocdn.com https://tile.openstreetmap.org https://*.tile.openstreetmap.org; connect-src 'self'; object-src 'none'; base-uri 'self'">
<title>Tokyo Rental Search Results</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" integrity="sha256-YU3qCpj/P06tdPBJGPax0bm6Q1wltfwjsho5TR4+TYc=" crossorigin="anonymous">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" integrity="sha256-YSWCMtmNZNwqex4CEw1nQhvFub2lmU7vcCKP+XVwwXA=" crossorigin="anonymous">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha256-Hk4dIpcqOSb0hZjgyvFOP+cEmDXUKKNE/tT542ZbNQg=" crossorigin="anonymous"></script>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<header>
  <div class="header-bar">
    <h1>Tokyo Rental Search</h1>
    <div class="header-stats" id="headerStats"></div>
    <div class="header-legend">
      <span class="grade-badge grade-A">A</span>
      <span class="grade-badge grade-B">B</span>
      <span class="grade-badge grade-C">C</span>
      <span class="grade-badge grade-D">D</span>
    </div>
  </div>
  <div class="subtitle" id="subtitle">Loading...</div>
</header>

<div class="stats" id="stats"></div>

<div class="prefs-panel">
  <button class="btn-prefs-toggle" id="btnPrefsToggle">Scoring Preferences</button>
  <div class="prefs-panel-body" id="prefsPanelBody" style="display:none">

    <div class="prefs-profile-bar">
      <select id="prefsProfileSelect"><option value="">-- Default --</option></select>
      <input type="text" id="prefsProfileTitle" placeholder="Profile name (or auto-generate)" class="prefs-profile-title">
      <button class="btn-prefs-action" id="btnPrefsGenTitle" title="Auto-generate title">Auto</button>
      <button class="btn-prefs-action btn-prefs-save" id="btnPrefsSave">Save</button>
      <button class="btn-prefs-action btn-prefs-delete" id="prefsProfileDelete">Delete</button>
      <button class="btn-prefs-action" id="btnPrefsReset">Reset</button>
      <button class="btn-prefs-action" id="btnPrefsReloadConfig" title="Reload scoring_config.json from server">Reload Config</button>
    </div>

    <div class="prefs-grid">

      <div class="prefs-section">
        <div class="prefs-section-title">Budget (yen/mo)</div>
        <div class="prefs-row">
          <label>Ideal Max<input type="number" id="prefBudgetIdealMax" step="10000" class="prefs-input"></label>
          <label>Hard Max<input type="number" id="prefBudgetHardMax" step="10000" class="prefs-input"></label>
        </div>
      </div>

      <div class="prefs-section">
        <div class="prefs-section-title">Size (sqm)</div>
        <div class="prefs-row">
          <label>Ideal Min<input type="number" id="prefSizeIdealMin" step="5" class="prefs-input"></label>
          <label>Ideal Max<input type="number" id="prefSizeIdealMax" step="5" class="prefs-input"></label>
        </div>
        <div class="prefs-row">
          <label>OK Min<input type="number" id="prefSizeOkMin" step="5" class="prefs-input"></label>
          <label>OK Max<input type="number" id="prefSizeOkMax" step="5" class="prefs-input"></label>
        </div>
      </div>

      <div class="prefs-section prefs-section-half">
        <div class="prefs-section-title">Walk to Station (min)</div>
        <div class="prefs-row">
          <label>Great<input type="number" id="prefWalkGreat" step="1" class="prefs-input"></label>
          <label>Good<input type="number" id="prefWalkGood" step="1" class="prefs-input"></label>
          <label>OK<input type="number" id="prefWalkOk" step="1" class="prefs-input"></label>
          <label>Max<input type="number" id="prefWalkMax" step="1" class="prefs-input"></label>
        </div>
      </div>

      <div class="prefs-section prefs-section-half">
        <div class="prefs-section-title">Building Age (years)</div>
        <div class="prefs-row">
          <label>Ideal<input type="number" id="prefAgeIdeal" step="5" class="prefs-input"></label>
          <label>OK<input type="number" id="prefAgeOk" step="5" class="prefs-input"></label>
          <label>Old<input type="number" id="prefAgeOld" step="5" class="prefs-input"></label>
        </div>
      </div>

      <div class="prefs-section">
        <div class="prefs-section-title">Hazard Penalties</div>
        <div class="prefs-row">
          <label>High risk<input type="number" id="prefHazardHigh" step="5" class="prefs-input"></label>
          <label>Moderate risk<input type="number" id="prefHazardModerate" step="5" class="prefs-input"></label>
        </div>
      </div>

      <div class="prefs-section prefs-section-wide">
        <div class="prefs-section-title">Scoring Weights <span class="prefs-weight-total" id="prefsWeightTotal">100</span></div>
        <div class="prefs-weights-grid" id="prefsWeightsGrid"></div>
      </div>

    </div>
  </div>
</div>

<div class="quick-filters" id="quickFilters"></div>

<div class="controls">
  <div class="controls-top-bar">
    <button class="btn-filters-toggle" id="btnFiltersToggle">Filters <span class="filter-count" id="filterCount"></span></button>
    <div class="control-group">
      <input type="text" id="filterSearch" placeholder="Search properties..." style="min-width:200px">
    </div>
    <div class="sort-wrap">
      <label class="sort-label">Sort:</label>
      <select id="sortDropdown">
        <option value="score">Score</option>
        <option value="total">Rent</option>
        <option value="size">Size</option>
        <option value="walk">Walk</option>
        <option value="age">Age</option>
      </select>
      <button id="sortDirBtn" class="sort-dir-btn" title="Toggle direction">&#9660;</button>
    </div>
    <button class="btn-fav" id="btnFavOnly">★ Favourites (0)</button>
    <button class="btn-reset" id="btnReset">Reset</button>
  </div>
  <div class="controls-body" id="controlsBody">
    <div class="control-group">
      <label>Source</label>
      <select id="filterSource">
        <option value="">All Sources</option>
        <option value="ur">UR Housing</option>
        <option value="suumo">SUUMO</option>
        <option value="rej">Real Estate Japan</option>
        <option value="best_estate">Best Estate</option>
        <option value="gaijinpot">GaijinPot</option>
        <option value="wagaya">Wagaya Japan</option>
        <option value="villagehouse">Village House</option>
        <option value="canary">Canary</option>
      </select>
    </div>
    <div class="control-group">
      <label>Prefecture</label>
      <select id="filterPref">
        <option value="">All Prefectures</option>
        <option value="saitama">Saitama</option>
        <option value="chiba">Chiba</option>
        <option value="kanagawa">Kanagawa</option>
        <option value="tokyo">Tokyo</option>
      </select>
    </div>
    <div class="control-group">
      <label>Area</label>
      <select id="filterArea">
        <option value="">All Areas</option>
      </select>
    </div>
    <div class="control-group">
      <label>Room Type</label>
      <select id="filterType">
        <option value="">All Types</option>
      </select>
    </div>
    <div class="control-group">
      <label>Max Total (¥/mo)</label>
      <input type="number" id="filterMaxRent" placeholder="e.g. 150000" step="10000">
    </div>
    <div class="control-group">
      <label>Min Size (㎡)</label>
      <input type="number" id="filterMinSize" placeholder="e.g. 55" step="5">
    </div>
    <div class="control-group">
      <label>Max Age (years)</label>
      <input type="number" id="filterMaxAge" placeholder="e.g. 25" step="5">
    </div>
    <div class="control-group">
      <label>Max Walk (min)</label>
      <input type="number" id="filterMaxWalk" placeholder="e.g. 10" step="5">
    </div>
    <div class="control-group">
      <label>Min Grade</label>
      <select id="filterMinGrade">
        <option value="">All Grades</option>
        <option value="80">A (80+)</option>
        <option value="65">B (65+)</option>
        <option value="50">C (50+)</option>
      </select>
    </div>
    <div class="control-group">
      <label><input type="checkbox" id="filterNoDeposit"> No deposit/key money</label>
    </div>
    <div class="control-group">
      <label>Min Floor</label>
      <input type="number" id="filterMinFloor" placeholder="e.g. 2" step="1" min="1">
    </div>
    <div class="control-group">
      <label id="commuteLabel">Max Commute (min)</label>
      <select id="filterMaxCommute">
        <option value="">Any</option>
        <option value="20">20</option>
        <option value="25">25</option>
        <option value="30">30</option>
        <option value="35">35</option>
        <option value="40">40</option>
        <option value="45">45</option>
        <option value="50">50</option>
        <option value="60">60</option>
      </select>
    </div>
    <div class="control-group">
      <label>Max Transfers</label>
      <select id="filterMaxTransfers">
        <option value="">Any</option>
        <option value="0">0 (direct)</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </div>
  </div>
</div>

<div id="mainContent">
  <div class="map-panel">
    <div class="map-toolbar" id="mapToolbar">
      <button class="toolbar-btn" id="btnPrefsGear" title="Scoring preferences">&#9881;</button>
    </div>
    <div id="mapContainer">
      <div id="map"></div>
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="side-panel">
    <div id="areaCards"></div>
    <div class="card-list" id="cardList"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <p>No rooms match your filters.</p>
    </div>

    <div class="card-load-more" id="loadMoreWrap" style="display:none">
      <button id="btnLoadMore">Load more</button>
      <span class="page-info" id="pageInfo"></span>
    </div>

    <div class="pagination" id="pagination" style="display:none">
      <button id="btnPrev">&#8249; Prev</button>
      <span class="page-info" id="paginationInfo"></span>
      <button id="btnNext">Next &#8250;</button>
    </div>
  </div>
</div>

<div class="profile-popup-overlay" id="profilePopupOverlay" style="display:none">
  <div class="profile-popup">
    <button class="popup-close" id="profileClose">&times;</button>
    <h3 id="profileTitle"></h3>
    <p class="profile-summary" id="profileSummary"></p>
    <div id="profileDimensions"></div>
    <ul id="profileNotable"></ul>
  </div>
</div>

<script src="viewer.js"></script>
</body>
</html>
