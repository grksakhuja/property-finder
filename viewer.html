<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Rental Search Results</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<header>
  <h1>Tokyo Rental Search Results</h1>
  <div class="subtitle" id="subtitle">Loading...</div>
</header>

<div class="stats" id="stats"></div>

<div class="legend">
  <span><span class="grade-badge grade-A">A</span> Excellent (80+)</span>
  <span><span class="grade-badge grade-B">B</span> Good (65-79)</span>
  <span><span class="grade-badge grade-C">C</span> Fair (50-64)</span>
  <span><span class="grade-badge grade-D">D</span> Below 50</span>
</div>

<div class="controls">
  <div class="control-group">
    <label>Source</label>
    <select id="filterSource">
      <option value="">All Sources</option>
      <option value="ur">UR Housing</option>
      <option value="suumo">SUUMO</option>
      <option value="rej">Real Estate Japan</option>
    </select>
  </div>
  <div class="control-group">
    <label>Prefecture</label>
    <select id="filterPref">
      <option value="">All Prefectures</option>
      <option value="saitama">Saitama</option>
      <option value="chiba">Chiba</option>
      <option value="kanagawa">Kanagawa</option>
      <option value="tokyo">Tokyo</option>
    </select>
  </div>
  <div class="control-group">
    <label>Area</label>
    <select id="filterArea">
      <option value="">All Areas</option>
    </select>
  </div>
  <div class="control-group">
    <label>Room Type</label>
    <select id="filterType">
      <option value="">All Types</option>
      <option value="2LDK">2LDK</option>
      <option value="2SLDK">2SLDK</option>
      <option value="3LDK">3LDK</option>
      <option value="3DK">3DK</option>
      <option value="3K">3K</option>
    </select>
  </div>
  <div class="control-group">
    <label>Max Total (¥/mo)</label>
    <input type="number" id="filterMaxRent" placeholder="e.g. 150000" step="10000">
  </div>
  <div class="control-group">
    <label>Min Size (㎡)</label>
    <input type="number" id="filterMinSize" placeholder="e.g. 55" step="5">
  </div>
  <div class="control-group">
    <label>Max Age (years)</label>
    <input type="number" id="filterMaxAge" placeholder="e.g. 25" step="5">
  </div>
  <div class="control-group">
    <label>Max Walk (min)</label>
    <input type="number" id="filterMaxWalk" placeholder="e.g. 10" step="5">
  </div>
  <div class="control-group">
    <label>Min Grade</label>
    <select id="filterMinGrade">
      <option value="">All Grades</option>
      <option value="80">A (80+)</option>
      <option value="65">B (65+)</option>
      <option value="50">C (50+)</option>
    </select>
  </div>
  <div class="control-group">
    <label>Search</label>
    <input type="text" id="filterSearch" placeholder="e.g. Kawaguchi, Musashino" style="min-width:180px">
  </div>
  <div class="control-group">
    <label>&nbsp;</label>
    <button class="btn-fav" id="btnFavOnly">★ Favourites (0)</button>
  </div>
  <div class="control-group">
    <label>&nbsp;</label>
    <button class="btn-reset" id="btnReset">Reset Filters</button>
  </div>
</div>

<button class="btn-map" id="btnToggleMap">Show Area Map</button>
<div id="mapContainer" style="display:none">
  <div id="map"></div>
</div>

<div id="areaCards"></div>

<div class="table-wrap">
<table>
  <thead>
    <tr id="tableHead"></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<div class="empty-state" id="emptyState" style="display:none">
  <p>No rooms match your filters.</p>
</div>

<div class="pagination" id="pagination" style="display:none">
  <button id="btnPrev">&#8249; Prev</button>
  <span class="page-info" id="pageInfo"></span>
  <button id="btnNext">Next &#8250;</button>
</div>

<script src="viewer.js"></script>
</body>
</html>
